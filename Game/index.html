      rawVocabData.forEach(entry => {
        const [lvl, w, d, s, syn] = entry.split('|');
        if (dictionary[lvl]) {
          dictionary[lvl].push({ word: w, def: d, sentence: s, synonyms: syn });
        }
      });
      return dictionary;
    };

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);

        if (type === 'correct') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(880, audioCtx.currentTime);

        } else if (type === 'incorrect') {

      const generateQuestion = (currentLvl, currentUsedWords) => {
        const levelWords = VOCAB_DICTIONARY[currentLvl];
        const availableWords = levelWords.filter(w => !currentUsedWords.has(w.word));
        
        const targetWord = availableWords.length > 0 
          ? availableWords[Math.floor(Math.random() * availableWords.length)]
          : levelWords[Math.floor(Math.random() * levelWords.length)];

        const wrongOptions = [];
        while (wrongOptions.length < 3) {
          const randomWord = levelWords[Math.floor(Math.random() * levelWords.length)];
          if (randomWord.word !== targetWord.word && !wrongOptions.includes(randomWord.def)) {
            wrongOptions.push(randomWord.def);
          }
        }

        const options = [...wrongOptions, targetWord.def];
        
        for (let i = options.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [options[i], options[j]] = [options[j], options[i]];
        }
        
        const correctIndex = options.indexOf(targetWord.def);

        setCurrentQuestion({ 
          word: targetWord.word, 
          def: targetWord.def, 
          sentence: targetWord.sentence,
          synonyms: targetWord.synonyms,

          playSoundEffect('correct');
          const newStreak = streak + 1;
          setStreak(newStreak);
          setMaxStreak(prev => Math.max(prev, newStreak)); 
          
          const points = (10 * level) + (newStreak * 5);
          setScore(s => s + points);

          let newPowerups = { ...powerups };
          if (newStreak % 4 === 0 && newStreak > 0) {
            const r = Math.random();
            let awarded = '';
            if (r < 0.25) { newPowerups.skip++; awarded = 'Skip'; }
            else if (r < 0.50) { newPowerups.fiftyFifty++; awarded = '50:50'; }
            else if (r < 0.75) { newPowerups.sentence++; awarded = 'Hint'; }
            else { newPowerups.synonym++; awarded = 'Synonym'; }
            
            showToastMsg(`🔥 4 Streak! +1 ${awarded}!`, 'powerup');
          }
          setPowerups(newPowerups);

          const newAnswered = questionsAnswered + 1;
          setQuestionsAnswered(newAnswered);

          setTimeout(() => {
            if (newAnswered >= 10) {
              if (lives < 5) {
                setLives(l => l + 1);
                showToastMsg(`🌟 Level Cleared! +1 Life!`, 'life');
              } else {
                setPowerups(prev => ({
                  skip: prev.skip + 1,
                  fiftyFifty: prev.fiftyFifty + 1,
                  sentence: prev.sentence + 1,
                  synonym: prev.synonym + 1
                }));
                showToastMsg(`🔥 Max HP! +1 All Powerups!`, 'powerup');
              }
              setGameState('level_passed');
            } else {
              generateQuestion(level, newUsedWords);
            }
          }, 600); 
        } else {
          playSoundEffect('incorrect');
          setStreak(0);
          const newLives = lives - 1;
          setLives(newLives);
          setFeedback({
            isCorrect: false,
            word: currentQuestion.word,
            def: currentQuestion.def
          });

          setTimeout(() => {
            setGameState('feedback');
          }, 1000); 
        }

                          {currentQuestion.word}
                        </h2>
                        <button onClick={() => playPronunciation(currentQuestion.word)} aria-label="Listen" className="bg-white border-2 shrink-0 border-black rounded-lg p-2 hover:bg-[#fde047] transition-colors manga-border-sm active:translate-y-0.5 active:translate-x-0.5 flex items-center justify-center">
                          <span className="material-symbols-outlined text-black font-bold text-xl">volume_up</span>
                        </button>
                      </div>
                    </div>
                    <div className="min-h-[3rem] flex items-center justify-center w-full shrink-0 mx-auto">
                      {streak > 1 && (
                        <div className="rotate-[-2deg] px-4 py-0.5 bg-[#ec5b13] border-4 border-black transform manga-border inline-flex items-center justify-center text-center gap-2 animate-pop my-1 mx-auto">
                          <span className="text-white font-black text-lg sm:text-xl italic tracking-tighter uppercase">CRITICAL HIT!</span>
                          <span className="text-[#fde047] font-black text-2xl sm:text-3xl italic manga-text-stroke">x{streak}</span>
                        </div>
                      )}
                    </div>
                    <div className="grid grid-cols-1 gap-3 w-full mt-2 mb-2">
                      {currentQuestion.options.map((opt, index) => {
                        const isRemoved = removedOptions.has(index);
                        const isSelected = selectedOption === index;
                        const isCorrectAnswer = index === currentQuestion.correctIndex;
                        let btnClass = "bg-white manga-border active:translate-y-1 active:translate-x-1 active:shadow-none hover:bg-slate-50";
                        let letterClass = "bg-black text-white group-hover:bg-[#ec5b13]";
                        if (isRemoved) {
                          btnClass = "bg-slate-200 opacity-50 grayscale cursor-not-allowed border-2 border-black";
                          letterClass = "bg-slate-400 text-slate-200";
                        } else if (isProcessing) {
                          if (isSelected) {
                            btnClass = isCorrectAnswer ? "bg-green-400 border-4 border-black manga-border" : "bg-[#ff4a4a] border-4 border-black manga-border";
                            letterClass = isCorrectAnswer ? "bg-green-700 text-white" : "bg-red-800 text-white";
                          } else if (isCorrectAnswer) {
                            btnClass = "bg-green-300 border-4 border-black manga-border opacity-90";
                            letterClass = "bg-green-700 text-white";
                          } else {
                            btnClass = "bg-slate-100 border-4 border-black opacity-50";
                            letterClass = "bg-slate-400 text-white";
                          }
                        }
                        return (
                          <button key={`${currentQuestion.word}-${index}`} onClick={() => !isRemoved && handleAnswer(opt, index)} disabled={isRemoved || isProcessing} className={`w-full transition-all p-3 text-left flex items-center gap-3 group ${btnClass}`}>
                            <span className={`w-8 h-8 sm:w-10 sm:h-10 shrink-0 border-2 border-black flex items-center justify-center font-black italic text-lg sm:text-xl transition-colors ${letterClass}`}>
                              {['A', 'B', 'C', 'D'][index]}
                            </span>
                            <span className="font-bold text-black text-xs sm:text-sm leading-tight uppercase">{opt}</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )}
              </section>
              <footer className="p-3 bg-white border-t-4 border-black relative z-10 shrink-0">
                <div className="flex justify-around items-center gap-2 sm:gap-4">
                  <button onClick={useSkip} disabled={powerups.skip <= 0} className={`relative group ${powerups.skip <= 0 ? 'opacity-50 grayscale cursor-not-allowed' : ''}`}>
                    <div className="absolute -top-2 -right-2 bg-black text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-white z-20">
                      {powerups.skip}
                    </div>
                    <div className={`w-[3.5rem] sm:w-[4.2rem] h-[3.5rem] border-2 border-black manga-border-sm flex flex-col items-center justify-center group-active:translate-y-0.5 transition-transform overflow-hidden relative ${powerups.skip > 0 ? 'bg-[#fde047]' : 'bg-white'}`}>
                      <span className="material-symbols-outlined text-black font-bold text-[20px] relative z-10">fast_forward</span>
                      <span className="text-[8px] sm:text-[9px] font-black text-black uppercase italic mt-0.5 leading-none">Skip</span>
                    </div>
                  </button>
                  <button onClick={useFiftyFifty} disabled={powerups.fiftyFifty <= 0 || removedOptions.size > 0} className={`relative group ${powerups.fiftyFifty <= 0 || removedOptions.size > 0 ? 'opacity-50 grayscale cursor-not-allowed' : ''}`}>
                    <div className="absolute -top-2 -right-2 bg-black text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-white z-20">
                      {powerups.fiftyFifty}
                    </div>
                    <div className={`w-[3.5rem] sm:w-[4.2rem] h-[3.5rem] border-2 border-black manga-border-sm flex flex-col items-center justify-center group-active:translate-y-0.5 transition-transform overflow-hidden relative ${powerups.fiftyFifty > 0 && removedOptions.size === 0 ? 'bg-[#fde047]' : 'bg-white'}`}>
                      <span className="text-black font-black text-[16px] sm:text-lg relative z-10 italic uppercase leading-none mt-1">1/2</span>
                      <span className="text-[8px] sm:text-[9px] font-black text-black uppercase italic mt-1 leading-none">Half</span>
                    </div>
                  </button>
                  <button onClick={useSentence} disabled={powerups.sentence <= 0} className={`relative group ${powerups.sentence <= 0 ? 'opacity-50 grayscale cursor-not-allowed' : ''}`}>
                    <div className="absolute -top-2 -right-2 bg-black text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-white z-20">
                      {powerups.sentence}
                    </div>
                    <div className={`w-[3.5rem] sm:w-[4.2rem] h-[3.5rem] border-2 border-black manga-border-sm flex flex-col items-center justify-center group-active:translate-y-0.5 transition-transform overflow-hidden relative ${powerups.sentence > 0 ? 'bg-[#fde047]' : 'bg-white'}`}>
                      <span className="material-symbols-outlined text-black font-bold text-[20px] relative z-10">lightbulb</span>
                      <span className="text-[8px] sm:text-[9px] font-black text-black uppercase italic mt-0.5 leading-none">Hint</span>
                    </div>
                  </button>
                  <button onClick={useSynonym} disabled={powerups.synonym <= 0} className={`relative group ${powerups.synonym <= 0 ? 'opacity-50 grayscale cursor-not-allowed' : ''}`}>
                    <div className="absolute -top-2 -right-2 bg-black text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-white z-20">
                      {powerups.synonym}
                    </div>
                    <div className={`w-[3.5rem] sm:w-[4.2rem] h-[3.5rem] border-2 border-black manga-border-sm flex flex-col items-center justify-center group-active:translate-y-0.5 transition-transform overflow-hidden relative ${powerups.synonym > 0 ? 'bg-[#fde047]' : 'bg-white'}`}>
                      <span className="material-symbols-outlined text-black font-bold text-[20px] relative z-10">spellcheck</span>
                      <span className="text-[8px] sm:text-[9px] font-black text-black uppercase italic mt-0.5 leading-none">Syns</span>
                    </div>
                  </button>
                </div>
              </footer>
            </main>
          </div>
        );
      }

      if (gameState === 'feedback') {
        return (
          <div className="bg-[#f8f6f6] text-slate-900 font-public-sans selection:bg-[#ec5b13] selection:text-white overflow-hidden min-h-screen">
            <GlobalStyles />
            <main className="h-screen-safe flex flex-col max-w-md mx-auto bg-[#ff4a4a] relative overflow-hidden shadow-2xl p-6 justify-center">
              <div className="absolute inset-0 pointer-events-none opacity-20 burst-bg"></div>
              <div className="bg-white p-6 rounded-2xl manga-border-thick relative z-10 animate-pop text-center flex flex-col items-center">
                <div className="absolute -top-8 bg-black border-4 border-white w-16 h-16 rounded-full flex items-center justify-center rotate-12 manga-border-sm">
                  <span className="material-symbols-outlined text-white text-4xl font-black">close</span>
                </div>
                <h2 className="text-3xl sm:text-4xl font-black italic uppercase tracking-tighter text-black mt-8 mb-2 leading-tight">Damage Taken <br/>Life Lost!</h2>
                <p className="text-slate-500 font-bold uppercase tracking-widest text-sm mb-6">Don't give up, {playerName}!</p>
                <div className="w-full bg-slate-100 p-5 rounded-xl border-4 border-black mb-8 relative text-left">
                  <button onClick={() => playPronunciation(feedback.word)} className="absolute top-3 right-3 text-slate-400 hover:text-black transition" title="Listen">
                    <span className="material-symbols-outlined text-[24px]">volume_up</span>
                  </button>
                  <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1">The word was</p>
                  <h3 className="text-3xl font-black text-[#ec5b13] uppercase italic mb-4 manga-text-stroke tracking-tighter">{feedback.word}</h3>
                  <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1">Correct meaning</p>
                  <p className="text-sm text-black font-bold uppercase leading-tight">{feedback.def}</p>
                </div>
                <button onClick={handleFeedbackNext} className="w-full bg-[#ec5b13] text-white font-black py-4 rounded-xl manga-border-thick hover:bg-orange-600 transition active:translate-y-1 active:translate-x-1 active:shadow-none text-xl tracking-tighter uppercase italic">
                  {lives <= 0 ? "Continue" : "Next Question"}
                </button>
              </div>
            </main>
          </div>
        );
      }

      if (gameState === 'level_passed') {
        const isWin = level >= 10;
        const wordsArray = Array.from(usedWords);
        const recentWords = wordsArray.slice(-3).join(', ');

        return (
          <div className="bg-[#f8f6f6] font-public-sans text-slate-900 min-h-screen flex flex-col">
            <GlobalStyles />
            <Confetti />
            <div className="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-[#f8f6f6] overflow-x-hidden border-x border-slate-200">
              <div className="flex items-center p-4 justify-between bg-white border-b-4 border-black z-10">
                <button onClick={() => setGameState('menu')} className="flex w-10 h-10 shrink-0 items-center justify-center bg-[#ec5b13] rounded-lg border-2 border-black active:translate-y-1 transition-transform">
                  <span className="material-symbols-outlined text-white">home</span>
                </button>
                <h2 className="text-xl font-black italic tracking-tighter uppercase text-slate-900">Vocab Quest</h2>
                <div className="flex w-10 h-10 items-center justify-end">
                  <button onClick={() => setGameState('leaderboard')} className="bg-slate-200 p-2 rounded-lg border-2 border-black active:translate-y-1 transition-transform">
                    <span className="material-symbols-outlined">emoji_events</span>
                  </button>
                </div>
              </div>
              <div className="flex-1 flex flex-col items-center justify-start p-6 space-y-6 animate-pop">
                <div className="relative w-full py-4 transform -rotate-1">
                  <h1 className="text-[#ec5b13] text-5xl md:text-6xl font-black italic text-center manga-text-stroke-thick uppercase tracking-tighter text-white">
                    {isWin ? "GAME\nCLEARED!" : "LEVEL\nCLEARED!"}
                  </h1>
                  <div className="absolute -top-2 -right-2 bg-[#fde047] text-black font-bold px-2 py-1 border-2 border-black rotate-12 text-sm">
                    SUGOI!
                  </div>
                </div>
                <div className="w-full aspect-square relative manga-border-thick rounded-xl overflow-hidden bg-[#fde047]">
                  <div className="absolute inset-0 opacity-30" style={{ backgroundImage: "repeating-conic-gradient(from 0deg, transparent 0deg 10deg, #fff 10deg 20deg)" }}></div>
                  <div className="absolute inset-0 flex items-center justify-center p-4">
                    <img className="w-full h-full object-contain drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)] grayscale opacity-80" alt="Defeated Monster" src={currentMonster.image}/>
                  </div>
                  <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-20">
                    <div className="border-4 border-red-600 text-red-600 font-black text-4xl sm:text-5xl italic transform -rotate-12 px-6 py-2 manga-border-thick bg-white/95 tracking-widest">
                      DEFEATED
                    </div>
                  </div>
                  <div className="absolute bottom-4 left-4 right-4 bg-white/90 border-2 border-black p-2 rounded-lg text-center backdrop-blur-sm">
                    <p className="text-xs font-bold text-slate-500 uppercase">Current Mastery</p>
                    <p className="text-lg font-black text-[#ec5b13] italic">{isWin ? "VOCAB MASTER" : "VOCAB VANGUARD"}</p>
                  </div>
                </div>
                <div className="w-full space-y-4">
                  <div className="w-full space-y-2">
                    <div className="flex justify-between items-end">
                      <span className="text-sm font-black uppercase italic">Rank Progress</span>
                      <span className="text-sm font-black text-[#ec5b13] italic">
                        {isWin ? `MAX LEVEL` : `LV. ${level} → LV. ${level + 1}`}
                      </span>
                    </div>
                    <div className="h-6 w-full bg-slate-200 border-2 border-black rounded-full overflow-hidden">
                      <div className="h-full bg-[#ec5b13] border-r-2 border-black" style={{ width: isWin ? '100%' : '85%' }}></div>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-white manga-border p-4 flex flex-col items-center justify-center transform rotate-1">
                      <p className="text-[10px] font-black uppercase text-slate-500">Total Score</p>
                      <p className="text-2xl font-black text-[#ec5b13] italic">{score} XP</p>
                    </div>
                    <div className="bg-[#fde047] manga-border p-4 flex flex-col items-center justify-center transform -rotate-1">
                      <p className="text-[10px] font-black uppercase text-black/60">Lives Left</p>
                      <div className="flex gap-1 mt-1">
                        {Array.from({ length: 5 }).map((_, i) => (
                          <span key={i} className={`material-symbols-outlined ${i < lives ? 'text-rose-500' : 'text-black/20'}`} style={{fontVariationSettings: "'FILL' 1", fontSize: "20px"}}>favorite</span>
                        ))}
                      </div>
                    </div>
                  </div>
                  <div className="bg-[#ec5b13]/10 border-2 border-dashed border-[#ec5b13] p-3 rounded-xl flex items-center gap-3">
                    <span className="material-symbols-outlined text-[#ec5b13] font-bold">menu_book</span>
                    <div>
                      <p className="text-xs font-bold uppercase">New words mastered:</p>
                      <p className="text-sm font-medium italic truncate w-[250px]">{recentWords}</p>
                    </div>
                  </div>
                </div>
              </div>
              <div className="p-6 space-y-3 bg-white border-t-4 border-black mt-auto z-10">
                <button onClick={handleNextLevel} className="w-full bg-[#ec5b13] hover:bg-orange-600 text-white font-black py-4 rounded-xl manga-border-thick text-xl italic uppercase tracking-tighter flex items-center justify-center gap-2 active:translate-y-1 active:translate-x-1 active:shadow-none transition-all">
                  {isWin ? "View Final Score" : "Next Level"}
                  <span className="material-symbols-outlined">fast_forward</span>
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'game_over' || gameState === 'leaderboard') {
        const isGameOverScreen = gameState === 'game_over';
        return (
          <div className="min-h-screen bg-[#f8f6f6] font-public-sans text-slate-900 flex flex-col">
            <GlobalStyles />
            <div className="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-[#f8f6f6] overflow-x-hidden border-x border-slate-200 pb-20 animate-pop">
              <div className="flex items-center p-4 justify-between bg-[#ec5b13]/10 border-b-4 border-black">
                <button onClick={() => setGameState('menu')} className="text-slate-900 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-[#ec5b13]/20 cursor-pointer transition border-2 border-black bg-white">
                  <span className="material-symbols-outlined">close</span>
                </button>
                <h2 className="text-[#ec5b13] text-xl font-black leading-tight tracking-tighter manga-text-stroke flex-1 text-center pr-10 uppercase italic">
                  {isGameOverScreen ? 'Battle Ended' : 'Hall of Fame'}
                </h2>
              </div>
              {isGameOverScreen && (
                <div className="px-4 py-6 flex flex-col items-center">
                  <div className="relative w-full aspect-square max-w-[280px] manga-border-thick bg-white overflow-hidden rounded-xl mb-6">
                    <img className="w-full h-full object-cover" alt="Tired but determined manga monster mascot" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCOGhT3QgrApuRGHbpQB1ZAEs_dis9Bmyc_jq9wN8ubPUonjttvUST0uHytWbC9gGgV6Ubw0eJSnrfltTlsULDJkaNfpvwxqne-9MDZEfC6-HCbjxYUgYCwnAcPK2cAk8OQ5mxW8uuN4rcwhxfiOsxQyJQNmc1OMuOdD8IPbjEVlz5k8pRg35yxVJoW3_wGkC3_mL8d_M2crkf5CXrw-DG_pR4kQxMLR66LwtZQe_rWZll__bGH6L0QdWqLAJCVyg-HGl1AATlNRJYp"/>
                    <div className="absolute bottom-2 left-2 bg-black text-white px-3 py-1 text-xs font-black italic transform -rotate-2">
                      STILL STANDING!
                    </div>
                  </div>
                  <h1 className="text-slate-900 tracking-tighter text-5xl font-black leading-tight px-4 text-center pb-2 manga-skew uppercase italic text-white manga-text-stroke-thick">
                    {level >= 10 && lives > 0 ? "VICTORY!" : "GAME OVER"}
                  </h1>
                  <p className="text-slate-500 font-bold text-sm uppercase tracking-widest mt-2">Level Reached: {level}</p>
                </div>
              )}
              {isGameOverScreen && (
                <div className="flex flex-wrap gap-3 p-4">
                  <div className="flex min-w-[140px] flex-1 flex-col gap-1 rounded-xl p-4 manga-border bg-white">
                    <p className="text-slate-500 text-xs font-black uppercase">Final Score</p>
                    <p className="text-[#ec5b13] tracking-tight text-3xl font-black leading-tight italic">{score}</p>
                  </div>
                  <div className="flex min-w-[140px] flex-1 flex-col gap-1 rounded-xl p-4 manga-border bg-white">
                    <p className="text-slate-500 text-xs font-black uppercase">Highest Streak</p>
                    <p className="text-slate-900 tracking-tight text-3xl font-black leading-tight italic">{maxStreak}</p>
                    <div className="flex items-center gap-1 mt-1">
                      <span className="material-symbols-outlined text-[#ec5b13] text-sm">star</span>
                      <p className="text-[#ec5b13] text-xs font-bold leading-normal">Combo!</p>
                    </div>
                  </div>
                </div>
              )}
              <div className={`px-4 py-6 ${!isGameOverScreen ? 'mt-4' : ''}`}>
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-slate-900 text-lg font-black uppercase italic manga-skew bg-[#ec5b13] text-white px-4 py-1 border-2 border-black">Top Trainers</h3>
                  <span className="text-slate-400 text-xs font-bold uppercase">Global Rank</span>
                </div>
                <div className="space-y-3">
                  {isLoadingScores && highScores.length === 0 ? (
                    <p className="text-center text-slate-500 font-bold italic py-4 animate-pulse">Loading global scores...</p>
                  ) : highScores.length === 0 ? (
                    <p className="text-center text-slate-500 font-bold italic py-4">No scores yet. Be the first to conquer!</p>
                  ) : (
                    highScores.slice(0, isGameOverScreen ? 3 : 10).map((s, i) => (
                      <div key={i} className="flex items-center justify-between p-3 rounded-lg manga-border-sm bg-white">
                        <div className="flex items-center gap-3">
                          <span className={`font-black text-xl italic w-6 ${i === 0 ? 'text-yellow-500' : i === 1 ? 'text-slate-400' : 'text-[#ec5b13]'}`}>{i+1}</span>
                          <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center border border-slate-300">
                            <span className="material-symbols-outlined text-slate-500 text-sm">
                              {i === 0 ? 'workspace_premium' : i === 1 ? 'military_tech' : 'star'}
                            </span>
                          </div>
                          <span className="font-bold text-sm truncate max-w-[120px] uppercase">{s.name}</span>
                        </div>
                        <span className="font-black text-sm italic">{s.score} XP</span>
                      </div>
                    ))
                  )}
                  {isGameOverScreen && !isScoreSaved && (
                     <div className="flex items-center justify-between p-3 rounded-lg manga-border bg-[#fde047] text-black mt-2">
                      <div className="flex items-center gap-3">
                        <span className="font-black text-xl italic w-6">--</span>
                        <div className="w-8 h-8 rounded-full bg-white/50 flex items-center justify-center border-2 border-black">
                          <span className="material-symbols-outlined text-black text-sm">person</span>
                        </div>
                        <span className="font-black text-sm uppercase truncate max-w-[100px]">{playerName}</span>
                      </div>
                      <span className="font-black text-sm italic">{score} XP</span>
                    </div>
                  )}
                </div>
              </div>
              <div className="p-4 mt-auto space-y-3">
                {isGameOverScreen && !isScoreSaved ? (
                  <div className="space-y-3">
                    <p className="text-center font-black text-slate-500 uppercase text-sm mb-1">Trainer: <span className="text-black">{playerName}</span></p>
                    <button onClick={() => saveScore(playerName)} className="w-full bg-[#ec5b13] text-white font-black py-4 rounded-xl manga-border-thick uppercase tracking-tighter text-xl italic active:translate-y-1 active:translate-x-1 active:shadow-none transition-all flex justify-center items-center gap-2">
                      Save Record
                      <span className="material-symbols-outlined font-black">save</span>
                    </button>
                  </div>
                ) : (
                  <div className="space-y-3">
                    <button onClick={beginQuest} className="w-full bg-[#ec5b13] text-white font-black py-4 rounded-xl manga-border-thick uppercase tracking-tighter text-xl italic active:translate-y-1 active:translate-x-1 active:shadow-none transition-all">
                      {isGameOverScreen ? 'Try Again' : 'Play Now'}
                    </button>
                    <button onClick={() => setGameState('menu')} className="w-full flex items-center justify-center gap-2 bg-white text-slate-900 font-black py-3 rounded-xl border-2 border-black manga-border-sm uppercase text-sm italic active:translate-y-1 transition-transform">
                      <span className="material-symbols-outlined">home</span>
                      Menu
                    </button>
                  </div>
                )}
              </div>
              <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md flex gap-2 border-t-4 border-black bg-white px-4 pb-6 pt-3 z-50">
                <button onClick={() => setGameState('menu')} className="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-[#ec5b13]">
                  <span className="material-symbols-outlined">swords</span>
                  <p className="text-[10px] font-black uppercase leading-normal tracking-wider">Quest</p>
                </button>
                <button onClick={() => setGameState('leaderboard')} className={`flex flex-1 flex-col items-center justify-center gap-1 ${!isGameOverScreen ? 'text-[#ec5b13]' : 'text-slate-400 hover:text-[#ec5b13]'}`}>
                  <span className={`material-symbols-outlined ${!isGameOverScreen ? 'fill-1' : ''}`}>emoji_events</span>
                  <p className="text-[10px] font-black uppercase leading-normal tracking-wider">Rank</p>
                </button>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
