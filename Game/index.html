<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vocab Quest</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    const PLAYER_AVATAR = "https://static.wikia.nocookie.net/deathbattle/images/1/1c/Portrait.ashketchum.png/revision/latest?cb=20240426202222";

    const THEMES = [
      { name: 'Grass', primary: '#10b981', secondary: '#059669' },
      { name: 'Fire', primary: '#ef4444', secondary: '#dc2626' },
      { name: 'Water', primary: '#3b82f6', secondary: '#2563eb' },
      { name: 'Lightning', primary: '#f59e0b', secondary: '#d97706' },
      { name: 'Psychic', primary: '#a855f7', secondary: '#9333ea' },
      { name: 'Fighting', primary: '#b45309', secondary: '#92400e' },
      { name: 'Darkness', primary: '#3f3f46', secondary: '#27272a' },
      { name: 'Metal', primary: '#94a3b8', secondary: '#64748b' },
      { name: 'Dragon', primary: '#ca8a04', secondary: '#a16207' },
      { name: 'Colorless', primary: '#9ca3af', secondary: '#6b7280' },
      { name: 'Fairy', primary: '#ec4899', secondary: '#db2777' }
    ];

    // --- COMPONENTS ---

    const Confetti = () => {
      return (
        <div className="fixed inset-0 pointer-events-none overflow-hidden z-50">
          {[...Array(60)].map((_, i) => {
            const colors = ['#f87171', '#fbbf24', '#34d399', '#60a5fa', '#a78bfa', '#ec4899'];
            const left = Math.random() * 100;
            const animDuration = Math.random() * 2 + 2;
            const delay = Math.random() * 1.5;
            const color = colors[Math.floor(Math.random() * colors.length)];
            return (
              <div
                key={i}
                className="absolute w-4 h-4 rounded-sm"
                style={{
                  left: `${left}%`,
                  top: `-5%`,
                  backgroundColor: color,
                  animation: `fall ${animDuration}s linear ${delay}s forwards`,
                  transform: `rotate(${Math.random() * 360}deg)`,
                }}
              />
            );
          })}
        </div>
      );
    };

    const Toast = ({ message, type }) => (
      <div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 animate-pop pointer-events-none">
        <div className={`px-6 py-3 rounded-full shadow-2xl flex items-center justify-center gap-3 text-white font-bold text-lg border-2 border-black manga-border-sm whitespace-nowrap
          ${type === 'powerup' ? 'bg-theme' : 'bg-[#fde047] text-black'}
        `}>
          {type === 'powerup' ? <span className="material-symbols-outlined" style={{fontVariationSettings: "'FILL' 1", fontSize: "24px"}}>bolt</span> : <span className="material-symbols-outlined" style={{fontVariationSettings: "'FILL' 1", fontSize: "24px"}}>favorite</span>}
          {message}
        </div>
      </div>
    );

    // --- MAIN APP ---

    function App() {
      const [vocabDictionary, setVocabDictionary] = useState({});
      const [isDataLoaded, setIsDataLoaded] = useState(false);
      const [masteryProfile, setMasteryProfile] = useState({});
      const [usedThemes, setUsedThemes] = useState([]);
      const [currentTheme, setCurrentTheme] = useState(null);

      const [gameState, setGameState] = useState('menu'); 
      const [level, setLevel] = useState(1);
      const [lives, setLives] = useState(5);
      const [score, setScore] = useState(0);
      
      const [streak, setStreak] = useState(0);
      const [maxStreak, setMaxStreak] = useState(0); 
      
      const [powerups, setPowerups] = useState({ skip: 1, fiftyFifty: 1, sentence: 1, synonym: 1 });
      
      const [questionsAnswered, setQuestionsAnswered] = useState(0);
      const [usedWords, setUsedWords] = useState(new Set());
      
      const [currentQuestion, setCurrentQuestion] = useState(null);
      const [removedOptions, setRemovedOptions] = useState(new Set());
      const [isProcessing, setIsProcessing] = useState(false);
      const [selectedOption, setSelectedOption] = useState(null);
      
      const [feedback, setFeedback] = useState(null);
      const [showSentenceModal, setShowSentenceModal] = useState(false);
      const [showSynonymModal, setShowSynonymModal] = useState(false);
      
      const [toast, setToast] = useState(null);
      const [highScores, setHighScores] = useState([]);
      const [isLoadingScores, setIsLoadingScores] = useState(false);
      
      const [currentMonster, setCurrentMonster] = useState({ name: '???', image: '' });
      const [isLoadingMonster, setIsLoadingMonster] = useState(false);
      
      const [playerName, setPlayerName] = useState('');
      const [isScoreSaved, setIsScoreSaved] = useState(false);

      const [isMusicMuted, setIsMusicMuted] = useState(false);
      const [isSfxMuted, setIsSfxMuted] = useState(false);
      
      const bgmRef = useRef(null);
      const duckingTimeoutRef = useRef(null);
      const restoreTimeoutRef = useRef(null);

      const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzMp36xAotY0aPKfzGzooyFnGgNiHOjQ5ivojEfaJH4VU3FQh3zX93iH78_JH2dlutu/exec';

      const fetchRandomMonster = async (theme) => {
        setIsLoadingMonster(true);
        try {
          // Map the 11+ TCG Themes to standard PokeAPI types
          const THEME_TO_TYPES = {
            'Grass': ['grass', 'bug'],
            'Fire': ['fire'],
            'Water': ['water', 'ice'],
            'Lightning': ['electric'],
            'Psychic': ['psychic', 'ghost'],
            'Fighting': ['fighting', 'rock', 'ground'],
            'Darkness': ['dark', 'poison'],
            'Metal': ['steel'],
            'Dragon': ['dragon'],
            'Colorless': ['normal', 'flying'],
            'Fairy': ['fairy']
          };
          
          const types = THEME_TO_TYPES[theme.name] || ['normal'];
          const randomType = types[Math.floor(Math.random() * types.length)];
          
          // Fetch the list of all pokemon with this type
          const typeRes = await fetch(`https://pokeapi.co/api/v2/type/${randomType}`);
          const typeData = await typeRes.json();
          const pokemonList = typeData.pokemon;
          
          // Select a random pokemon from that list and fetch its specific data
          const randomPoke = pokemonList[Math.floor(Math.random() * pokemonList.length)].pokemon;
          const pokeRes = await fetch(randomPoke.url);
          const data = await pokeRes.json();

          setCurrentMonster({
            name: data.name.toUpperCase(),
            image: data.sprites.other['official-artwork'].front_default || data.sprites.front_default
          });
        } catch (error) {
          console.error("Failed to fetch pokemon", error);
          setCurrentMonster({ name: "WILD POKEMON", image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" });
        } finally {
          setIsLoadingMonster(false);
        }
      };

      // INIT: Load JSON data, Mastery Profile, and set up BGM Track
      useEffect(() => {
        const loadData = async () => {
          try {
            const res = await fetch('./vocab.json');
            const data = await res.json();
            const dictionary = {};
            for (let i = 1; i <= 10; i++) dictionary[i] = [];
            data.forEach(entry => {
              const [lvl, w, d, s, syn] = entry.split('|');
              if (dictionary[lvl]) {
                dictionary[lvl].push({ word: w, def: d, sentence: s, synonyms: syn });
              }
            });
            setVocabDictionary(dictionary);
            setIsDataLoaded(true);
          } catch (err) {
            console.error("Failed to load vocab.json", err);
            alert("Warning: Could not fetch vocab.json. Make sure it is hosted in the same folder.");
          }
        };
        loadData();

        const savedMastery = localStorage.getItem('11plus_vocab_mastery');
        if (savedMastery) setMasteryProfile(JSON.parse(savedMastery));

        const savedScores = localStorage.getItem('11plus_vocab_scores');
        if (savedScores) setHighScores(JSON.parse(savedScores));

        bgmRef.current = new Audio('against_the_iron_crown.mp3');
        bgmRef.current.loop = true;

        const fetchGlobalScores = async () => {
          setIsLoadingScores(true);
          try {
            const response = await fetch(GOOGLE_SHEETS_URL);
            const data = await response.json();
            if (data && Array.isArray(data)) {
              const sortedScores = data.sort((a, b) => b.score - a.score).slice(0, 10);
              setHighScores(sortedScores);
              localStorage.setItem('11plus_vocab_scores', JSON.stringify(sortedScores));
            }
          } catch (error) {
            console.error("Could not fetch global scores:", error);
          } finally {
            setIsLoadingScores(false);
          }
        };
        fetchGlobalScores();
        
        return () => {
          if (bgmRef.current) {
            bgmRef.current.pause();
            bgmRef.current = null;
          }
        };
      }, []);

      // Control BGM playback based on game state
      useEffect(() => {
        if (!bgmRef.current) return;
        if (gameState === 'playing' && !isMusicMuted) {
          bgmRef.current.volume = 0.35; // Base volume set to 35%
          bgmRef.current.play().catch(e => console.log("BGM autoplay prevented:", e));
        } else {
          bgmRef.current.pause();
        }
      }, [gameState, isMusicMuted]);

      const saveScore = async (name) => {
        const finalName = name || 'Anonymous Trainer';
        const newScore = { name: finalName, score, level };
        const newScores = [...highScores, newScore]
          .sort((a, b) => b.score - a.score)
          .slice(0, 10);
          
        setHighScores(newScores);
        localStorage.setItem('11plus_vocab_scores', JSON.stringify(newScores));
        setIsScoreSaved(true);

        try {
          await fetch(GOOGLE_SHEETS_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: finalName, score: score, level: level }),
          });
        } catch (error) {
          console.error("Could not save to Google Sheets:", error);
        }
      };

      const showToastMsg = (msg, type) => {
        setToast({ message: msg, type });
        setTimeout(() => setToast(null), 3000);
      };

      let audioCtx = null;
      const playSoundEffect = (type) => {
        if (isSfxMuted) return;
        
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'correct') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(880, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'incorrect') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, audioCtx.currentTime);
          osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
          gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'powerup') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(440, audioCtx.currentTime);
          osc.frequency.linearRampToValueAtTime(1108.73, audioCtx.currentTime + 0.3);
          gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.3);
        }
      };

      const selectRandomTheme = (currentUsed) => {
        let available = THEMES.filter(t => !currentUsed.includes(t.name));
        if (available.length === 0) available = THEMES; // Reset if all 11 have been used
        return available[Math.floor(Math.random() * available.length)];
      };

      const beginQuest = () => {
        setLevel(1);
        setLives(5);
        setScore(0);
        setStreak(0);
        setMaxStreak(0);
        setIsScoreSaved(false);
        setPowerups({ skip: 1, fiftyFifty: 1, sentence: 1, synonym: 1 });
        setQuestionsAnswered(0);
        setUsedWords(new Set());
        setIsProcessing(false);
        setSelectedOption(null);
        
        const newTheme = selectRandomTheme([]);
        setUsedThemes([newTheme.name]);
        setCurrentTheme(newTheme);

        setGameState('vs_screen');
        fetchRandomMonster(newTheme);
      };

      const startBattle = () => {
        setGameState('playing');
        generateQuestion(level, usedWords);
      };

      const generateQuestion = (currentLvl, currentUsedWords) => {
        const levelWords = vocabDictionary[currentLvl] || [];
        const unseenThisRound = levelWords.filter(w => !currentUsedWords.has(w.word));
        
        // Spaced Repetition Logic (Leitner System Concept)
        const mastered = unseenThisRound.filter(w => (masteryProfile[w.word] || 0) >= 3);
        const learning = unseenThisRound.filter(w => (masteryProfile[w.word] || 0) < 3);

        let poolToDrawFrom = learning;
        
        if (learning.length === 0) {
          poolToDrawFrom = mastered; // Edge case: all words in level mastered, so give them a random mix of mastered ones.
        } else if (mastered.length > 0 && Math.random() < 0.1) {
          poolToDrawFrom = mastered; // 10% chance to test a previously mastered word
        }

        const targetWord = poolToDrawFrom.length > 0 
          ? poolToDrawFrom[Math.floor(Math.random() * poolToDrawFrom.length)]
          : (levelWords[0] || { word: 'Error', def: 'Error', sentence: '', synonyms: '' });

        const wrongOptions = [];
        while (wrongOptions.length < 3) {
          const randomWord = levelWords[Math.floor(Math.random() * levelWords.length)];
          if (randomWord.word !== targetWord.word && !wrongOptions.includes(randomWord.def)) {
            wrongOptions.push(randomWord.def);
          }
        }

        const options = [...wrongOptions, targetWord.def];
        for (let i = options.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [options[i], options[j]] = [options[j], options[i]];
        }
        
        const correctIndex = options.indexOf(targetWord.def);

        setCurrentQuestion({ 
          word: targetWord.word, 
          def: targetWord.def, 
          sentence: targetWord.sentence,
          synonyms: targetWord.synonyms,
          options, 
          correctIndex 
        });
        setRemovedOptions(new Set());
        setShowSentenceModal(false);
        setShowSynonymModal(false);
        setIsProcessing(false);
        setSelectedOption(null);
      };

      const handleAnswer = (opt, index) => {
        if (isProcessing) return;
        setIsProcessing(true);
        setSelectedOption(index);

        const newUsedWords = new Set([...usedWords, currentQuestion.word]);
        setUsedWords(newUsedWords);

        if (opt === currentQuestion.def) {
          playSoundEffect('correct');
          
          // Increment Mastery Tracking
          const newMastery = { ...masteryProfile };
          newMastery[currentQuestion.word] = (newMastery[currentQuestion.word] || 0) + 1;
          setMasteryProfile(newMastery);
          localStorage.setItem('11plus_vocab_mastery', JSON.stringify(newMastery));

          const newStreak = streak + 1;
          setStreak(newStreak);
          setMaxStreak(prev => Math.max(prev, newStreak)); 
          
          const points = (10 * level) + (newStreak * 5);
          setScore(s => s + points);

          let newPowerups = { ...powerups };
          if (newStreak % 4 === 0 && newStreak > 0) {
            const r = Math.random();
            let awarded = '';
            if (r < 0.25) { newPowerups.skip++; awarded = 'Skip'; }
            else if (r < 0.50) { newPowerups.fiftyFifty++; awarded = '50:50'; }
            else if (r < 0.75) { newPowerups.sentence++; awarded = 'Hint'; }
            else { newPowerups.synonym++; awarded = 'Synonym'; }
            
            showToastMsg(`🔥 4 Streak! +1 ${awarded}!`, 'powerup');
          }
          setPowerups(newPowerups);

          const newAnswered = questionsAnswered + 1;
          setQuestionsAnswered(newAnswered);

          setTimeout(() => {
            if (newAnswered >= 10) {
              if (lives < 5) {
                setLives(l => l + 1);
                showToastMsg(`🌟 Level Cleared! +1 Life!`, 'life');
              } else {
                setPowerups(prev => ({
                  skip: prev.skip + 1,
                  fiftyFifty: prev.fiftyFifty + 1,
                  sentence: prev.sentence + 1,
                  synonym: prev.synonym + 1
                }));
                showToastMsg(`🔥 Max HP! +1 All Powerups!`, 'powerup');
              }
              setGameState('level_passed');
            } else {
              generateQuestion(level, newUsedWords);
            }
          }, 600); 
        } else {
          playSoundEffect('incorrect');
          setStreak(0);
          const newLives = lives - 1;
          setLives(newLives);
          setFeedback({
            isCorrect: false,
            word: currentQuestion.word,
            def: currentQuestion.def
          });

          setTimeout(() => {
            setGameState('feedback');
          }, 1000); 
        }
      };

      const handleFeedbackNext = () => {
        if (lives <= 0) {
          setGameState('game_over');
        } else {
          setGameState('playing');
          generateQuestion(level, usedWords);
        }
      };

      const handleNextLevel = () => {
        if (level >= 10) {
          setGameState('game_over'); 
        } else {
          const nextLevel = level + 1;
          setLevel(nextLevel);
          setQuestionsAnswered(0);
          
          const newTheme = selectRandomTheme(usedThemes);
          setUsedThemes([...usedThemes, newTheme.name]);
          setCurrentTheme(newTheme);

          setGameState('vs_screen');
          fetchRandomMonster(newTheme);
        }
      };

      const useSkip = () => {
        if (powerups.skip > 0 && !isProcessing) {
          playSoundEffect('powerup');
          setPowerups(prev => ({ ...prev, skip: prev.skip - 1 }));
          const newUsedWords = new Set([...usedWords, currentQuestion.word]);
          setUsedWords(newUsedWords);
          generateQuestion(level, newUsedWords);
        }
      };

      const useFiftyFifty = () => {
        if (powerups.fiftyFifty > 0 && !isProcessing) {
          const wrongIndices = currentQuestion.options
            .map((opt, i) => ({ opt, i }))
            .filter(item => item.opt !== currentQuestion.def && !removedOptions.has(item.i))
            .map(item => item.i);

          if (wrongIndices.length >= 2) {
            playSoundEffect('powerup');
            const shuffled = [...wrongIndices].sort(() => Math.random() - 0.5);
            setRemovedOptions(new Set([...removedOptions, shuffled[0], shuffled[1]]));
            setPowerups(prev => ({ ...prev, fiftyFifty: prev.fiftyFifty - 1 }));
          } else if (wrongIndices.length === 1) {
            playSoundEffect('powerup');
            setRemovedOptions(new Set([...removedOptions, wrongIndices[0]]));
            setPowerups(prev => ({ ...prev, fiftyFifty: prev.fiftyFifty - 1 }));
          }
        }
      };

      const useSentence = () => {
        if (powerups.sentence > 0 && !showSentenceModal && !showSynonymModal && !isProcessing) {
          playSoundEffect('powerup');
          setPowerups(prev => ({ ...prev, sentence: prev.sentence - 1 }));
          setShowSentenceModal(true);
        }
      };

      const useSynonym = () => {
        if (powerups.synonym > 0 && !showSynonymModal && !showSentenceModal && !isProcessing) {
          playSoundEffect('powerup');
          setPowerups(prev => ({ ...prev, synonym: prev.synonym - 1 }));
          setShowSynonymModal(true);
        }
      };

      const playPronunciation = (wordToSay) => {
        if (isSfxMuted) return;

        // Clear any existing timeouts to prevent erratic volume jumping if clicked rapidly
        if (duckingTimeoutRef.current) clearTimeout(duckingTimeoutRef.current);
        if (restoreTimeoutRef.current) clearTimeout(restoreTimeoutRef.current);
        
        const dipVolume = () => { 
          if (bgmRef.current && !isMusicMuted) bgmRef.current.volume = 0.05; // Significant ducking to 5%
        };
        
        const restoreVolume = () => { 
          restoreTimeoutRef.current = setTimeout(() => {
            if (bgmRef.current && !isMusicMuted) bgmRef.current.volume = 0.35; // Restore to 35% standard volume
          }, 1500); // 1.5 second wait AFTER audio finishes
        };

        // Immediately dip the volume
        dipVolume();

        // Wait 1.5 seconds before playing the pronunciation
        duckingTimeoutRef.current = setTimeout(() => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(wordToSay);
            utterance.lang = 'en-GB';
            utterance.rate = 0.9; 
            
            utterance.onend = restoreVolume;
            utterance.onerror = restoreVolume;
            
            window.speechSynthesis.speak(utterance);
          } else {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=en-GB&q=${encodeURIComponent(wordToSay)}`;
            const audio = new Audio(url);
            audio.onended = restoreVolume;
            audio.onerror = restoreVolume;
            audio.play().catch(error => {
              console.log("Audio playback failed on fallback:", error);
              restoreVolume();
            });
          }
        }, 1500); // 1.5 second wait BEFORE audio starts
      };

      const GlobalStyles = () => (
        <style>{`
          @import url('https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,700;0,900;1,900&display=swap');
          @import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap');
          @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@700&display=swap');

          .font-public-sans { font-family: 'Public Sans', sans-serif; }
          .font-action { font-family: 'Bangers', cursive; letter-spacing: 0.05em; }
          .font-ui { font-family: 'Oswald', sans-serif; text-transform: uppercase; }

          /* Dynamic Theme Classes */
          .bg-theme { background-color: var(--theme-main); }
          .bg-theme-sec { background-color: var(--theme-sec); }
          .hover\\:bg-theme-sec:hover { background-color: var(--theme-sec); }
          .text-theme { color: var(--theme-main); }
          .border-theme { border-color: var(--theme-main); }
          .shadow-theme { box-shadow: 4px 4px 0px 0px var(--theme-main); }
          .shadow-theme-md { box-shadow: 6px 6px 0px 0px var(--theme-main); }
          .shadow-theme-lg { box-shadow: 8px 8px 0px 0px var(--theme-main); }

          .manga-border { border: 3px solid #000; box-shadow: 4px 4px 0px #000; }
          .manga-border-thick { border: 4px solid #000; box-shadow: 6px 6px 0px #000; }
          .manga-border-sm { border: 2px solid #000; box-shadow: 3px 3px 0px #000; }
          .manga-outline { box-shadow: 4px 4px 0px 0px #000; }
          .manga-outline-sm { box-shadow: 2px 2px 0px 0px #000; }
          .manga-skew { transform: skew(-2deg); }
          .manga-text-stroke { -webkit-text-stroke: 1px black; }
          .manga-text-stroke-thick { -webkit-text-stroke: 2px #000; text-shadow: 4px 4px 0px #000; }
          
          .battle-button:active { box-shadow: 0px 0px 0px 0px #000; transform: translate(4px, 4px); }
          
          .h-screen-safe { height: 100vh; height: 100dvh; }
          .burst-bg { background: repeating-conic-gradient(from 0deg, rgba(253, 224, 71, 0.1) 0deg 15deg, transparent 15deg 30deg); }
          .radial-burst-bg { background: radial-gradient(circle, #fde047 0%, var(--theme-main) 70%, #221610 100%); }
          
          .action-lines {
            background: radial-gradient(circle, transparent 20%, white 100%),

                      {powerups.fiftyFifty}
                    </div>
                    <div className={`w-[3.5rem] sm:w-[4.2rem] h-[3.5rem] border-2 border-black manga-border-sm flex flex-col items-center justify-center group-active:translate-y-0.5 transition-transform overflow-hidden relative ${powerups.fiftyFifty > 0 && removedOptions.size === 0 ? 'bg-[#fde047]' : 'bg-white'}`}>
                      <span className="text-black font-black text-[16px] sm:text-lg relative z-10 italic uppercase leading-none mt-1">1/2</span>
                      <span className="text-[8px] sm:text-[9px] font-black text-black uppercase italic mt-1 leading-none">Half</span>
                    </div>
                  </button>
                  <button onClick={useSentence} disabled={powerups.sentence <= 0} className={`relative group ${powerups.sentence <= 0 ? 'opacity-50 grayscale cursor-not-allowed' : ''}`}>
                    <div className="absolute -top-2 -right-2 bg-black text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-white z-20">
                      {powerups.sentence}
                    </div>
                    <div className={`w-[3.5rem] sm:w-[4.2rem] h-[3.5rem] border-2 border-black manga-border-sm flex flex-col items-center justify-center group-active:translate-y-0.5 transition-transform overflow-hidden relative ${powerups.sentence > 0 ? 'bg-[#fde047]' : 'bg-white'}`}>
                      <span className="material-symbols-outlined text-black font-bold text-[20px] relative z-10">lightbulb</span>
                      <span className="text-[8px] sm:text-[9px] font-black text-black uppercase italic mt-0.5 leading-none">Hint</span>
                    </div>
                  </button>
                  <button onClick={useSynonym} disabled={powerups.synonym <= 0} className={`relative group ${powerups.synonym <= 0 ? 'opacity-50 grayscale cursor-not-allowed' : ''}`}>
                    <div className="absolute -top-2 -right-2 bg-black text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-white z-20">
                      {powerups.synonym}
                    </div>
                    <div className={`w-[3.5rem] sm:w-[4.2rem] h-[3.5rem] border-2 border-black manga-border-sm flex flex-col items-center justify-center group-active:translate-y-0.5 transition-transform overflow-hidden relative ${powerups.synonym > 0 ? 'bg-[#fde047]' : 'bg-white'}`}>
                      <span className="material-symbols-outlined text-black font-bold text-[20px] relative z-10">spellcheck</span>
                      <span className="text-[8px] sm:text-[9px] font-black text-black uppercase italic mt-0.5 leading-none">Syns</span>
                    </div>
                  </button>
                </div>
              </footer>
            </main>
          </div>
        );
      }

      if (gameState === 'feedback') {
        return (
          <div style={themeVars} className="bg-[#f8f6f6] text-slate-900 font-public-sans selection:bg-theme selection:text-white overflow-hidden min-h-screen">
            <GlobalStyles />
            <main className="h-screen-safe flex flex-col max-w-md mx-auto bg-[#ff4a4a] relative overflow-hidden shadow-2xl p-6 justify-center">
              <div className="absolute inset-0 pointer-events-none opacity-20 burst-bg"></div>
              <div className="bg-white p-6 rounded-2xl manga-border-thick relative z-10 animate-pop text-center flex flex-col items-center">
                <div className="absolute -top-8 bg-black border-4 border-white w-16 h-16 rounded-full flex items-center justify-center rotate-12 manga-border-sm">
                  <span className="material-symbols-outlined text-white text-4xl font-black">close</span>
                </div>
                <h2 className="text-3xl sm:text-4xl font-black italic uppercase tracking-tighter text-black mt-8 mb-2 leading-tight">Damage Taken <br/>Life Lost!</h2>
                <p className="text-slate-500 font-bold uppercase tracking-widest text-sm mb-6">Don't give up, {playerName}!</p>
                <div className="w-full bg-slate-100 p-5 rounded-xl border-4 border-black mb-8 relative text-left">
                  <button onClick={() => playPronunciation(feedback.word)} className="absolute top-3 right-3 text-slate-400 hover:text-black transition" title="Listen">
                    <span className="material-symbols-outlined text-[24px]">volume_up</span>
                  </button>
                  <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1">The word was</p>
                  <h3 className="text-3xl font-black text-theme uppercase italic mb-4 manga-text-stroke tracking-tighter">{feedback.word}</h3>
                  <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1">Correct meaning</p>
                  <p className="text-sm text-black font-bold uppercase leading-tight">{feedback.def}</p>
                </div>
                <button onClick={handleFeedbackNext} className="w-full bg-theme text-white font-black py-4 rounded-xl manga-border-thick hover:bg-theme-sec transition active:translate-y-1 active:translate-x-1 active:shadow-none text-xl tracking-tighter uppercase italic">
                  {lives <= 0 ? "Continue" : "Next Question"}
                </button>
              </div>
            </main>
          </div>
        );
      }

      if (gameState === 'level_passed') {
        const isWin = level >= 10;
        const wordsArray = Array.from(usedWords);
        const recentWords = wordsArray.slice(-3).join(', ');

        return (
          <div style={themeVars} className="bg-[#f8f6f6] font-public-sans text-slate-900 min-h-screen flex flex-col">
            <GlobalStyles />
            <Confetti />
            <div className="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-[#f8f6f6] overflow-x-hidden border-x border-slate-200">
              <div className="flex items-center p-4 justify-between bg-white border-b-4 border-black z-10">
                <button onClick={() => setGameState('menu')} className="flex w-10 h-10 shrink-0 items-center justify-center bg-theme rounded-lg border-2 border-black active:translate-y-1 transition-transform">
                  <span className="material-symbols-outlined text-white">home</span>
                </button>
                <h2 className="text-xl font-black italic tracking-tighter uppercase text-slate-900">Vocab Quest</h2>
                <div className="flex w-10 h-10 items-center justify-end">
                  <button onClick={() => setGameState('leaderboard')} className="bg-slate-200 p-2 rounded-lg border-2 border-black active:translate-y-1 transition-transform">
                    <span className="material-symbols-outlined">emoji_events</span>
                  </button>
                </div>
              </div>
              <div className="flex-1 flex flex-col items-center justify-start p-6 space-y-6 animate-pop">
                <div className="relative w-full py-4 transform -rotate-1">
                  <h1 className="text-theme text-5xl md:text-6xl font-black italic text-center manga-text-stroke-thick uppercase tracking-tighter text-white">
                    {isWin ? "GAME\nCLEARED!" : "LEVEL\nCLEARED!"}
                  </h1>
                  <div className="absolute -top-2 -right-2 bg-[#fde047] text-black font-bold px-2 py-1 border-2 border-black rotate-12 text-sm">
                    SUGOI!
                  </div>
                </div>
                <div className="w-full aspect-square relative manga-border-thick rounded-xl overflow-hidden bg-[#fde047]">
                  <div className="absolute inset-0 opacity-30" style={{ backgroundImage: "repeating-conic-gradient(from 0deg, transparent 0deg 10deg, #fff 10deg 20deg)" }}></div>
                  <div className="absolute inset-0 flex items-center justify-center p-4">
                    <img className="w-full h-full object-contain drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)] grayscale opacity-80" alt="Defeated Monster" src={currentMonster.image}/>
                  </div>
                  <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-20">
                    <div className="border-4 border-red-600 text-red-600 font-black text-4xl sm:text-5xl italic transform -rotate-12 px-6 py-2 manga-border-thick bg-white/95 tracking-widest">
                      DEFEATED
                    </div>
                  </div>
                  <div className="absolute bottom-4 left-4 right-4 bg-white/90 border-2 border-black p-2 rounded-lg text-center backdrop-blur-sm">
                    <p className="text-xs font-bold text-slate-500 uppercase">Current Mastery</p>
                    <p className="text-lg font-black text-theme italic">{isWin ? "VOCAB MASTER" : "VOCAB VANGUARD"}</p>
                  </div>
                </div>
                <div className="w-full space-y-4">
                  <div className="w-full space-y-2">
                    <div className="flex justify-between items-end">
                      <span className="text-sm font-black uppercase italic">Rank Progress</span>
                      <span className="text-sm font-black text-theme italic">
                        {isWin ? `MAX LEVEL` : `LV. ${level} → LV. ${level + 1}`}
                      </span>
                    </div>
                    <div className="h-6 w-full bg-slate-200 border-2 border-black rounded-full overflow-hidden">
                      <div className="h-full bg-theme border-r-2 border-black" style={{ width: isWin ? '100%' : '85%' }}></div>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-white manga-border p-4 flex flex-col items-center justify-center transform rotate-1">
                      <p className="text-[10px] font-black uppercase text-slate-500">Total Score</p>
                      <p className="text-2xl font-black text-theme italic">{score} XP</p>
                    </div>
                    <div className="bg-[#fde047] manga-border p-4 flex flex-col items-center justify-center transform -rotate-1">
                      <p className="text-[10px] font-black uppercase text-black/60">Lives Left</p>
                      <div className="flex gap-1 mt-1">
                        {Array.from({ length: 5 }).map((_, i) => (
                          <span key={i} className={`material-symbols-outlined ${i < lives ? 'text-rose-500' : 'text-black/20'}`} style={{fontVariationSettings: "'FILL' 1", fontSize: "20px"}}>favorite</span>
                        ))}
                      </div>
                    </div>
                  </div>
                  <div className="border-2 border-dashed border-theme p-3 rounded-xl flex items-center gap-3 relative overflow-hidden bg-white/50">
                    <div className="absolute inset-0 bg-theme opacity-10 pointer-events-none"></div>
                    <span className="material-symbols-outlined text-theme font-bold relative z-10">menu_book</span>
                    <div className="relative z-10">
                      <p className="text-xs font-bold uppercase">New words mastered:</p>
                      <p className="text-sm font-medium italic truncate w-[250px]">{recentWords}</p>
                    </div>
                  </div>
                </div>
              </div>
              <div className="p-6 space-y-3 bg-white border-t-4 border-black mt-auto z-10">
                <button onClick={handleNextLevel} className="w-full bg-theme hover:bg-theme-sec text-white font-black py-4 rounded-xl manga-border-thick text-xl italic uppercase tracking-tighter flex items-center justify-center gap-2 active:translate-y-1 active:translate-x-1 active:shadow-none transition-all">
                  {isWin ? "View Final Score" : "Next Level"}
                  <span className="material-symbols-outlined">fast_forward</span>
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'game_over' || gameState === 'leaderboard') {
        const isGameOverScreen = gameState === 'game_over';
        return (
          <div style={themeVars} className="min-h-screen bg-[#f8f6f6] font-public-sans text-slate-900 flex flex-col">
            <GlobalStyles />
            <div className="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-[#f8f6f6] overflow-x-hidden border-x border-slate-200 pb-20 animate-pop">
              <div className="flex items-center p-4 justify-between bg-theme border-b-4 border-black">
                <button onClick={() => setGameState('menu')} className="text-slate-900 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-white/80 cursor-pointer transition border-2 border-black bg-white">
                  <span className="material-symbols-outlined">close</span>
                </button>
                <h2 className="text-white text-xl font-black leading-tight tracking-tighter manga-text-stroke flex-1 text-center pr-10 uppercase italic">
                  {isGameOverScreen ? 'Battle Ended' : 'Hall of Fame'}
                </h2>
              </div>
              {isGameOverScreen && (
                <div className="px-4 py-6 flex flex-col items-center">
                  <div className="relative w-full aspect-square max-w-[280px] manga-border-thick bg-white overflow-hidden rounded-xl mb-6">
                    <img className="w-full h-full object-cover" alt="Tired but determined manga monster mascot" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCOGhT3QgrApuRGHbpQB1ZAEs_dis9Bmyc_jq9wN8ubPUonjttvUST0uHytWbC9gGgV6Ubw0eJSnrfltTlsULDJkaNfpvwxqne-9MDZEfC6-HCbjxYUgYCwnAcPK2cAk8OQ5mxW8uuN4rcwhxfiOsxQyJQNmc1OMuOdD8IPbjEVlz5k8pRg35yxVJoW3_wGkC3_mL8d_M2crkf5CXrw-DG_pR4kQxMLR66LwtZQe_rWZll__bGH6L0QdWqLAJCVyg-HGl1AATlNRJYp"/>
                    <div className="absolute bottom-2 left-2 bg-black text-white px-3 py-1 text-xs font-black italic transform -rotate-2">
                      STILL STANDING!
                    </div>
                  </div>
                  <h1 className="text-slate-900 tracking-tighter text-5xl font-black leading-tight px-4 text-center pb-2 manga-skew uppercase italic text-white manga-text-stroke-thick">
                    {level >= 10 && lives > 0 ? "VICTORY!" : "GAME OVER"}
                  </h1>
                  <p className="text-slate-500 font-bold text-sm uppercase tracking-widest mt-2">Level Reached: {level}</p>
                </div>
              )}
              {isGameOverScreen && (
                <div className="flex flex-wrap gap-3 p-4">
                  <div className="flex min-w-[140px] flex-1 flex-col gap-1 rounded-xl p-4 manga-border bg-white">
                    <p className="text-slate-500 text-xs font-black uppercase">Final Score</p>
                    <p className="text-theme tracking-tight text-3xl font-black leading-tight italic">{score}</p>
                  </div>
                  <div className="flex min-w-[140px] flex-1 flex-col gap-1 rounded-xl p-4 manga-border bg-white">
                    <p className="text-slate-500 text-xs font-black uppercase">Highest Streak</p>
                    <p className="text-slate-900 tracking-tight text-3xl font-black leading-tight italic">{maxStreak}</p>
                    <div className="flex items-center gap-1 mt-1">
                      <span className="material-symbols-outlined text-theme text-sm">star</span>
                      <p className="text-theme text-xs font-bold leading-normal">Combo!</p>
                    </div>
                  </div>
                </div>
              )}
              <div className={`px-4 py-6 ${!isGameOverScreen ? 'mt-4' : ''}`}>
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-slate-900 text-lg font-black uppercase italic manga-skew bg-theme text-white px-4 py-1 border-2 border-black">Top Trainers</h3>
                  <span className="text-slate-400 text-xs font-bold uppercase">Global Rank</span>
                </div>
                <div className="space-y-3">
                  {isLoadingScores && highScores.length === 0 ? (
                    <p className="text-center text-slate-500 font-bold italic py-4 animate-pulse">Loading global scores...</p>
                  ) : highScores.length === 0 ? (
                    <p className="text-center text-slate-500 font-bold italic py-4">No scores yet. Be the first to conquer!</p>
                  ) : (
                    highScores.slice(0, isGameOverScreen ? 3 : 10).map((s, i) => (
                      <div key={i} className="flex items-center justify-between p-3 rounded-lg manga-border-sm bg-white">
                        <div className="flex items-center gap-3">
                          <span className={`font-black text-xl italic w-6 ${i === 0 ? 'text-yellow-500' : i === 1 ? 'text-slate-400' : 'text-theme'}`}>{i+1}</span>
                          <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center border border-slate-300">
                            <span className="material-symbols-outlined text-slate-500 text-sm">
                              {i === 0 ? 'workspace_premium' : i === 1 ? 'military_tech' : 'star'}
                            </span>
                          </div>
                          <span className="font-bold text-sm truncate max-w-[120px] uppercase">{s.name}</span>
                        </div>
                        <span className="font-black text-sm italic">{s.score} XP</span>
                      </div>
                    ))
                  )}
                  {isGameOverScreen && !isScoreSaved && (
                     <div className="flex items-center justify-between p-3 rounded-lg manga-border bg-[#fde047] text-black mt-2">
                      <div className="flex items-center gap-3">
                        <span className="font-black text-xl italic w-6">--</span>
                        <div className="w-8 h-8 rounded-full bg-white/50 flex items-center justify-center border-2 border-black">
                          <span className="material-symbols-outlined text-black text-sm">person</span>
                        </div>
                        <span className="font-black text-sm uppercase truncate max-w-[100px]">{playerName}</span>
                      </div>
                      <span className="font-black text-sm italic">{score} XP</span>
                    </div>
                  )}
                </div>
              </div>
              <div className="p-4 mt-auto space-y-3">
                {isGameOverScreen && !isScoreSaved ? (
                  <div className="space-y-3">
                    <p className="text-center font-black text-slate-500 uppercase text-sm mb-1">Trainer: <span className="text-black">{playerName}</span></p>
                    <button onClick={() => saveScore(playerName)} className="w-full bg-theme text-white font-black py-4 rounded-xl manga-border-thick uppercase tracking-tighter text-xl italic active:translate-y-1 active:translate-x-1 active:shadow-none transition-all flex justify-center items-center gap-2">
                      Save Record
                      <span className="material-symbols-outlined font-black">save</span>
                    </button>
                  </div>
                ) : (
                  <div className="space-y-3">
                    <button onClick={beginQuest} className="w-full bg-theme text-white font-black py-4 rounded-xl manga-border-thick uppercase tracking-tighter text-xl italic active:translate-y-1 active:translate-x-1 active:shadow-none transition-all">
                      {isGameOverScreen ? 'Try Again' : 'Play Now'}
                    </button>
                    <button onClick={() => setGameState('menu')} className="w-full flex items-center justify-center gap-2 bg-white text-slate-900 font-black py-3 rounded-xl border-2 border-black manga-border-sm uppercase text-sm italic active:translate-y-1 transition-transform">
                      <span className="material-symbols-outlined">home</span>
                      Menu
                    </button>
                  </div>
                )}
              </div>
              <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md flex gap-2 border-t-4 border-black bg-white px-4 pb-6 pt-3 z-50">
                <button onClick={() => setGameState('menu')} className="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-theme">
                  <span className="material-symbols-outlined">swords</span>
                  <p className="text-[10px] font-black uppercase leading-normal tracking-wider">Quest</p>
                </button>
                <button onClick={() => setGameState('leaderboard')} className={`flex flex-1 flex-col items-center justify-center gap-1 ${!isGameOverScreen ? 'text-theme' : 'text-slate-400 hover:text-theme'}`}>
                  <span className={`material-symbols-outlined ${!isGameOverScreen ? 'fill-1' : ''}`}>emoji_events</span>
                  <p className="text-[10px] font-black uppercase leading-normal tracking-wider">Rank</p>
                </button>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
